# Available runners configured by board.cmake.
runners:
- pyocd
- jlink

# Default flash runner if --runner is not given.
flash-runner: pyocd

# Default debug runner if --runner is not given.
debug-runner: pyocd

# Common runner configuration values.
config:
  board_dir: C:/Users/isisk/.platformio/packages/framework-zephyr@2.20701.220422/boards/arm/frdm_kl25z
  # Build outputs:
  elf_file: zephyr.elf
  bin_file: zephyr.bin
  # Host tools:
  gdb: C:/Users/isisk/.platformio/packages/toolchain-gccarmnoneeabi@1.80201.181220/bin/arm-none-eabi-gdb.exe

# Runner specific arguments
args:
  pyocd:
    - --dt-flash=y
    - --target=kl25z
  jlink:
    - --dt-flash=y
    - --device=MKL25Z128xxx4
